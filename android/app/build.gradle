apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
react {}
android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    namespace "com.congdong4g.vpn"
    defaultConfig {
        applicationId "com.congdong4g.vpn"
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }
    signingConfigs {
        debug { storeFile file("debug.keystore"); storePassword "android"; keyAlias "androiddebugkey"; keyPassword "android" }
        release {
            if (project.hasProperty("MYAPP_UPLOAD_STORE_FILE")) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug { signingConfig signingConfigs.debug }
        release { minifyEnabled true; proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"; signingConfig signingConfigs.release }
    }
    splits { abi { reset(); enable true; universalApk true; include "armeabi-v7a", "arm64-v8a", "x86_64" } }
}
dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("io.github.2dust:libXray:1.8.24")
    implementation("com.github.react-native-linear-gradient:react-native-linear-gradient:2.8.3")
}
